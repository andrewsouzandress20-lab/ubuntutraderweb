name: Atualizar dados a cada 15min

on:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: npm install

      - name: Executar script de atualização
        run: node backend/updateData.js

      - name: Commit e push dos dados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market-data.json
          git commit -m "Atualização automática dos dados"
          git push
